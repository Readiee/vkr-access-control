server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: любой неизвестный путь отдаётся index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование запросов к бэкенду
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health-check для docker compose
    location /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
