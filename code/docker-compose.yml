services:
  redis:
    image: redis:7-alpine
    container_name: vkr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vkr-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      # demo_knowledge_base.owl = TBox + SWRL + наполненный happy-path ABox.
      # Для production стоит поменять на edu_ontology_with_rules.owl
      # и наполнять ABox через /integration/courses/{id}/sync
      ONTOLOGY_FILE_PATH: /app/onto/ontologies/demo_knowledge_base.owl
      APP_ENV: prod
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; urllib.request.urlopen('http://127.0.0.1:8000/').read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vkr-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
